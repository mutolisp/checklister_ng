name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'  # Only triggered when push tag（e.g. v1.0.0)

jobs:
  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pandoc
        run: brew install pandoc

      - name: Install Python dependencies
        run: |
          python -m venv backend/venv
          source backend/venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build macOS app
        run: |
          source backend/venv/bin/activate
          pyinstaller checklister.spec --clean -y

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist/dmg-staging
          cp -R dist/checklister-ng.app dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create \
            -volname "checklister-ng" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            dist/checklister-ng-macos-arm64_${VERSION}.dmg
          rm -rf dist/dmg-staging

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: checklister-ng-macos-arm64
          path: dist/checklister-ng-macos-arm64_*.dmg

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pandoc
        run: brew install pandoc

      - name: Install Python dependencies
        run: |
          python -m venv backend/venv
          source backend/venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build macOS app
        run: |
          source backend/venv/bin/activate
          pyinstaller checklister.spec --clean -y

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist/dmg-staging
          cp -R dist/checklister-ng.app dist/dmg-staging/
          ln -s /Applications dist/dmg-staging/Applications
          hdiutil create \
            -volname "checklister-ng" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            dist/checklister-ng-macos-intel_${VERSION}.dmg
          rm -rf dist/dmg-staging

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: checklister-ng-macos-intel
          path: dist/checklister-ng-macos-intel_*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pandoc
        run: |
          choco install pandoc -y
          # 驗證 pandoc 實際路徑（非 shim）
          where pandoc
          pandoc --version

      - name: Install Python dependencies
        run: |
          python -m venv backend\venv
          backend\venv\Scripts\activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Windows exe
        run: |
          backend\venv\Scripts\activate
          pyinstaller checklister_win32.spec --clean -y

      - name: Verify pandoc in build
        shell: bash
        run: |
          # PyInstaller onefile 無法直接檢查內容，改用 spec 的 print 輸出確認
          echo "Build completed — check above log for pandoc bundling path and size"

      - name: Rename exe with version
        shell: bash
        run: mv dist/checklister-ng.exe dist/checklister-ng-windows_x64_${{ steps.version.outputs.VERSION }}.exe

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: checklister-ng-windows
          path: dist/checklister-ng-windows_x64_*.exe

  release:
    needs: [build-macos-arm, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: checklister-ng-macos-arm64

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: checklister-ng-macos-intel

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: checklister-ng-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            checklister-ng-macos-arm64_*.dmg
            checklister-ng-macos-intel_*.dmg
            checklister-ng-windows_x64_*.exe
          generate_release_notes: true
